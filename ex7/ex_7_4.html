<html>
   <head>
      <title>Ex-7-4: Animation</title>
     <style>
            .center { text-align: center; }
        </style>
    </head>
      <script 
        src="https://code.jquery.com/jquery-4.0.0.min.js" 
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" 
        crossorigin="anonymous">
      </script>

    <style>
           img {
               position: relative;
               width: 200px; 
               height: 200px; 
           }
      </style>

<script>
          $(document).ready(function() {

          $("#button").click(function(){
            $("img").animate({left: '750px'});
          });

          $("#button-1").click(function(){
            $("img").animate({
              height: 'toggle'
          });
        });
      });
</script>

	
   <body>
    <h1> Adventures of Tintin </h1>
       <button id="button">Go</button>
       <button id="button-1">Collapse Images</button>
       
       <div>
           <img src="img/tintin-milou.jpg"> <br>
           <img src="img/captain-haddock_v2.jpg"> <br>
           <img src="img/prof_calcu.jpg"> <br>
           <img src="img/Thomson_&_Thompson.png"> <br>
       </div>
       
<br><br>

       </footer>
   </body>
</html>
